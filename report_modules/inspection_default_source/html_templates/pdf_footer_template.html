<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script>
    function substitute() {
        var vars = {};
        var query_strings_from_url = document.location.search.substring(1).split('&');
        for (var query_string in query_strings_from_url) {
            if (query_strings_from_url.hasOwnProperty(query_string)) {
                var temp_var = query_strings_from_url[query_string].split('=', 2);
                vars[temp_var[0]] = decodeURI(temp_var[1]);
            }
        }
        var css_selector_classes = ['page', 'frompage', 'topage', 'webpage', 'section', 'subsection', 'date', 'isodate', 'time', 'title', 'doctitle', 'sitepage', 'sitepages'];
        for (var css_class in css_selector_classes) {
            if (css_selector_classes.hasOwnProperty(css_class)) {
                var element = document.getElementsByClassName(css_selector_classes[css_class]);
                for (var j = 0; j < element.length; ++j) {
                    element[j].textContent = vars[css_selector_classes[css_class]];
                }
            }
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .footer-bottom {
            padding: 8px 30px;
            margin-top: 5px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid black;
            margin-left: 20px;
            margin-right: 20px;
            background-color: white;
        }
        .footer-date {
            text-align: left;
            font-size: 12px;
            color: #333;
            font-weight: 500;
        }
        .footer-page {
            text-align: right;
            font-size: 12px;
            color: #010101;
            font-weight: 500;
        }
        /* Flexbox fallback for wkhtmltopdf */
        .container {
            width: 100%;
            border: 1px solid black;
            box-sizing: border-box;
            padding: 5px 30px;
        }
        .left { float: left; width: 70%; }
        .right { float: right; width: 25%; text-align: right; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body onload="substitute()">
    <div style="padding: 0 20px;">
        <div class="footer-bottom clearfix" style="display: block;">
            <div class="footer-date left">
                {{ site_name }} on {{ current_date }}
            </div>
            <div class="footer-page right">
                Page <span class="page"></span> of <span class="topage"></span>
            </div>
        </div>
    </div>
</body>
</html>
