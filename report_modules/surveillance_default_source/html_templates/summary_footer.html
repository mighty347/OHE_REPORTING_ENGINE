<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Montserrat", Arial, sans-serif;
        }

        .footer-bottom {
            background-color: #020c23;
            padding: 2px 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        p {
            font-size: 15px;
            color: #fff;
            font-weight: 500;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="footer-bottom">
        <p>
            <span>{{ footer_inspection_name }} on {{ footer_current_date }}</span>
        </p>
        <p>Page <span id="pnum"></span> of <span id="ptotal"></span></p>
    </div>
    <script>
        var vars = {};
        var query = document.location.search.substring(1);
        var pairs = query.split('&');
        for (var i = 0; i < pairs.length; i++) {
            var kv = pairs[i].split('=', 2);
            vars[kv[0]] = decodeURIComponent(kv[1]);
        }
        var offset = {{ page_offset }};
        document.getElementById('pnum').textContent = parseInt(vars['page'] || '1') + offset;
        document.getElementById('ptotal').textContent = parseInt(vars['topage'] || '1') + offset;
    </script>
</body>

</html>
